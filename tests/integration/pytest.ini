[pytest]
testpaths = .
python_files = test_*.py
# -n auto: pytest-xdist spreads tests across CPUs.  Each test owns its
# own tmpdir + uniquely-bound ports + linbpq subprocess, so there is
# no shared state to race on.
addopts = -v --tb=short -n auto
markers =
    long_runtime: timer-bound test that waits >60s (ID/BT beacons etc).
        conftest's pytest_collection_modifyitems sorts these to the front
        of the xdist queue so they run in parallel with the rest.
