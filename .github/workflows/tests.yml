name: tests

on:
  push:
    branches: [master]
    # Run on any code/test change.  The ignore list catches the things
    # that demonstrably can't break the suite: pure docs / planning /
    # markdown, the docs workflow + mkdocs config, the docker-publish
    # workflow, and the runtime-image artefacts (the test image is
    # docker/Dockerfile.test, not docker/Dockerfile).
    paths-ignore:
      - 'docs/**'
      - 'notes/**'
      - '**.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/docker-publish.yml'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - 'docker/bpq32.cfg.example'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'notes/**'
      - '**.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/docker-publish.yml'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - 'docker/bpq32.cfg.example'
  workflow_dispatch:

# Cancel an in-flight run on the same ref when a new commit lands.
# Avoids stacking up CI minutes when a stream of commits hits
# (e.g. a docs rewrite firing per-page commits).  PR runs get
# their own group so they don't cancel master pushes and vice
# versa.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Opt every action in this workflow into the Node.js 24 runtime.
# GitHub will force this on by default starting June 2026; setting
# it explicitly here clears the deprecation warnings now and is a
# no-op once GHA flips the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Integration suite — split into two parallel jobs by the
  # ``long_runtime`` marker.  The "fast" job runs everything except
  # long_runtime in ~10-12 min; the "long" job runs only
  # long_runtime tests (beacons, soak/leak — 2-3 min each, 6 of
  # them, ~10-15 min wallclock).  Splitting halves wallclock vs
  # the merged single-job arrangement and keeps each job under a
  # comfortable timeout.
  #
  # Both jobs share the same Docker image (built once, then each
  # job runs its slice).
  integration-fast:
    name: integration (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          tags: linbpq-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite (not long_runtime)
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD/reports:/reports" \
            linbpq-test:ci \
            python3 -m pytest -n auto -m "not long_runtime" \
              --junitxml=/reports/junit-integration-fast.xml

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-fast
          path: reports/junit-integration-fast.xml
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-integration-fast.xml

  integration-long:
    name: integration (long_runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          tags: linbpq-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run long_runtime integration tests
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD/reports:/reports" \
            linbpq-test:ci \
            python3 -m pytest -n auto -m long_runtime \
              --junitxml=/reports/junit-integration-long.xml

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration-long
          path: reports/junit-integration-long.xml
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-integration-long.xml

  # Playwright suite — runs natively rather than in Docker so we
  # don't have to ship Chromium in the integration image.  The
  # pytest-playwright plugin's ``playwright install`` step is the
  # bulk of the setup; cache the browser binaries.
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libpaho-mqtt-dev \
            libjansson-dev \
            libminiupnpc-dev \
            libconfig-dev \
            libpcap-dev \
            zlib1g-dev

      - name: Build linbpq
        run: |
          make -j"$(nproc)"
          test -x linbpq

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install pytest + playwright
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-playwright
          # Only Chromium — we don't need Firefox / WebKit.
          playwright install --with-deps chromium

      - name: Run playwright suite
        env:
          LINBPQ_BIN: ${{ github.workspace }}/linbpq
        run: |
          mkdir -p reports
          cd tests/playwright
          python -m pytest -n auto \
            --junitxml="$GITHUB_WORKSPACE/reports/junit-playwright.xml"

      - name: Upload playwright junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-playwright
          path: reports/junit-playwright.xml
          if-no-files-found: warn

      - name: Publish playwright summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-playwright.xml
