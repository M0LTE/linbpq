name: tests

on:
  push:
    branches: [master]
    # Run on any code/test change.  The ignore list catches the things
    # that demonstrably can't break the suite: pure docs / planning /
    # markdown, the docs workflow + mkdocs config, the docker-publish
    # workflow, and the runtime-image artefacts (the test image is
    # docker/Dockerfile.test, not docker/Dockerfile).
    paths-ignore:
      - 'docs/**'
      - 'notes/**'
      - '**.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/docker-publish.yml'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - 'docker/bpq32.cfg.example'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'notes/**'
      - '**.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/docker-publish.yml'
      - 'docker/Dockerfile'
      - 'docker/entrypoint.sh'
      - 'docker/bpq32.cfg.example'
  workflow_dispatch:

# Cancel an in-flight run on the same ref when a new commit lands.
# Avoids stacking up CI minutes when a stream of commits hits
# (e.g. a docs rewrite firing per-page commits).  PR runs get
# their own group so they don't cancel master pushes and vice
# versa.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# Opt every action in this workflow into the Node.js 24 runtime.
# GitHub will force this on by default starting June 2026; setting
# it explicitly here clears the deprecation warnings now and is a
# no-op once GHA flips the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Integration suite — runs inside the Docker image so the test
  # environment matches what `make test` does locally.  The image
  # builds linbpq from source as part of `docker build`, which
  # also doubles as a build smoke test.
  integration:
    runs-on: ubuntu-latest
    # The long_runtime tests (beacons, soak/leak) hold a worker
    # for 2-3 minutes each, and with two-instance + modem-driver
    # coverage the whole suite is now ~12-15 min on a healthy
    # runner.  20-min was hitting the cancel threshold on slow
    # runners; 30 gives headroom while still flagging genuine
    # hangs.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (with layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.test
          tags: linbpq-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration suite
        # Mount a host directory so junit output survives the container
        # for the upload step below.  The image's WORKDIR is
        # /src/tests/integration, so this picks up the integration
        # suite by default.
        run: |
          mkdir -p reports
          docker run --rm \
            -v "$PWD/reports:/reports" \
            linbpq-test:ci \
            python3 -m pytest -n auto --junitxml=/reports/junit-integration.xml

      - name: Upload integration junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: reports/junit-integration.xml
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-integration.xml

  # Playwright suite — runs natively rather than in Docker so we
  # don't have to ship Chromium in the integration image.  The
  # pytest-playwright plugin's ``playwright install`` step is the
  # bulk of the setup; cache the browser binaries.
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libpaho-mqtt-dev \
            libjansson-dev \
            libminiupnpc-dev \
            libconfig-dev \
            libpcap-dev \
            zlib1g-dev

      - name: Build linbpq
        run: |
          make -j"$(nproc)"
          test -x linbpq

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install pytest + playwright
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist pytest-playwright
          # Only Chromium — we don't need Firefox / WebKit.
          playwright install --with-deps chromium

      - name: Run playwright suite
        env:
          LINBPQ_BIN: ${{ github.workspace }}/linbpq
        run: |
          mkdir -p reports
          cd tests/playwright
          python -m pytest -n auto \
            --junitxml="$GITHUB_WORKSPACE/reports/junit-playwright.xml"

      - name: Upload playwright junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-playwright
          path: reports/junit-playwright.xml
          if-no-files-found: warn

      - name: Publish playwright summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: reports/junit-playwright.xml
