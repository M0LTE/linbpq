name: docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Rapid-fire commits (e.g. the per-page docs rewrite stream)
# would otherwise queue up N Pages deploys racing each other.
# Cancel any in-flight run on the same ref when a new commit
# lands — only the latest state ships, and CI minutes don't get
# burned on intermediate deploys we'd never see.  PRs get their
# own group so a PR push doesn't cancel the master deploy.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      # --strict turns warnings (dead links, missing nav targets,
      # broken anchors) into hard failures so the docs PR red-flags
      # rot before it lands.
      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  # Boot a real linbpq with every fenced ``ini`` block under
  # docs/**/*.md and assert the parser accepts it cleanly.  Catches
  # the case where a doc references a keyword the parser has
  # renamed / removed / repurposed upstream.
  cfg-snippets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libpaho-mqtt-dev \
            libjansson-dev \
            libminiupnpc-dev \
            libconfig-dev \
            libpcap-dev \
            zlib1g-dev

      - name: Build linbpq
        run: |
          make -j"$(nproc)"
          test -x linbpq

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-xdist

      - name: Run doc cfg-snippet boot check
        env:
          LINBPQ_BIN: ${{ github.workspace }}/linbpq
        run: |
          cd tests/integration
          python -m pytest test_doc_cfg_snippets.py -n auto

  deploy:
    # Publish to GitHub Pages off master only.  PR builds verify
    # the site builds + cfg snippets parse; they don't push.  Don't
    # deploy if the cfg-snippets check failed — a passing parse is a
    # gate, not just a signal.
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build, cfg-snippets]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
