name: docker-publish

# Builds the runtime linbpq Docker image and pushes it to Docker Hub.
#
# Tags published:
#   - ``latest`` and ``master-<short-sha>`` on every master push.
#   - ``v<x.y.z>`` plus ``<x.y.z>`` and ``latest`` on a ``v*`` tag push.
#   - On manual dispatch, the branch name (or ``latest`` for master).
#
# Secrets required:
#   - ``DOCKERHUB_USERNAME`` — Docker Hub user / org owning the image.
#   - ``DOCKERHUB_TOKEN``    — Docker Hub access token.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  # Don't cancel a release-tag publish mid-push — we'd end up with
  # half the manifest list.  Master pushes can cancel each other.
  cancel-in-progress: ${{ github.ref == 'refs/heads/master' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/linbpq
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=master-,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
